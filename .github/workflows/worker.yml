name: news-digest-worker

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true로 두면 이메일 발송/이력 기록 없이 테스트만 수행"
        required: false
        default: "false"
      user_id:
        description: "특정 사용자 1명만 처리할 UUID (비워두면 전체 대상)"
        required: false
        default: ""
      force:
        description: "true로 두면 발송 시각 창을 무시하고 즉시 처리 (테스트용)"
        required: false
        default: "false"
      test_send:
        description: "true로 두면 실제 메일은 보내되 발송 이력은 남기지 않음 (user_id 필수)"
        required: false
        default: "false"
      settings_json:
        description: "test_send일 때 DB 대신 사용할 설정 JSON (대시보드에서 저장 전 미리보기 발송 시 전달)"
        required: false
        default: ""

jobs:
  run-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run digest worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USE_TLS: "true"
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_NAME: "주요뉴스 알리미"
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          USER_ID: ${{ github.event.inputs.user_id }}
          FORCE_SEND: ${{ github.event.inputs.force }}
          TEST_SEND: ${{ github.event.inputs.test_send }}
          TEST_SETTINGS_JSON: ${{ github.event.inputs.settings_json }}
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$USER_ID" ]; then
            ARGS="$ARGS --user-id $USER_ID"
          fi
          if [ "$FORCE_SEND" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "$TEST_SEND" = "true" ]; then
            ARGS="$ARGS --test-send"
          fi
          python main.py $ARGS

