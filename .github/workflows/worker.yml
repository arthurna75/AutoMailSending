name: news-digest-worker

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true로 두면 이메일 발송/이력 기록 없이 테스트만 수행"
        required: false
        default: "false"
      user_id:
        description: "특정 사용자 1명만 처리할 UUID (비워두면 전체 대상)"
        required: false
        default: ""
      force:
        description: "true로 두면 발송 시각 창을 무시하고 즉시 처리 (테스트용)"
        required: false
        default: "false"

jobs:
  run-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run digest worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USE_TLS: "true"
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_NAME: "주요뉴스 알리미"
          MAX_DAILY_LLM_COST_USD: "0.5"
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.user_id }}" ]; then
            ARGS="$ARGS --user-id ${{ github.event.inputs.user_id }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python main.py $ARGS

